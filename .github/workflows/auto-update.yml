name: Auto-update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get latest release version
        id: latest
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ask-sol/openagent/releases/latest | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update formula version
        if: steps.latest.outputs.version != ''
        run: |
          sed -i "s/version \".*\"/version \"${{ steps.latest.outputs.version }}\"/" Formula/openagent.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Bump formula to v${{ steps.latest.outputs.version }}"
          git push
